        .cell { width:var(--cell-size); height:var(--cell-size); border-radius:7px; position:relative;
            display:flex; align-items:center; justify-content:center; font-size:calc(var(--cell-size)*0.44);
            transition:all 0.15s ease; background:var(--grass); border:2px solid transparent; }
        .cell.alt { background:var(--grass-alt); }

        .cell.wall::after { content:'🧱'; font-size:calc(var(--cell-size)*0.44); position:absolute; pointer-events:none; opacity:0.8; }
        .cell.patrol-path { background:var(--patrol-path)!important; border-color:#ffcc80!important; box-shadow:inset 0 0 8px rgba(255,152,0,0.25); }

<body>
<div class="game-wrapper" id="gameWrapper">
    <button class="lang-btn" onclick="switchLang()">🌐</button>
    <div id="mainMenu" class="main-menu">

        <div class="menu-subtitle" id="mSub">回合制策略潜行 · 收集蠕虫安全回家</div>
        <button class="btn primary" onclick="startNormalGame()" id="btnNormal">▶ 开始普通关卡</button>
        <button class="btn endless" onclick="showDifficulty()" id="btnEndless">♾️ 无尽模式</button>

            <button onclick="backToMenu()" style="background:#fff3e0;border-color:#ff8f00;" id="menuBtn">🏠菜单</button>
        </div>
    </div>
</div>
<div class="message-overlay" id="messageOverlay"><div class="message-box" id="messageBox"></div></div>

<script>

function t(key, ...args){
    const str = L[lang]?.[key];
    if (typeof str === 'function') return str(...args);
    return str !== undefined ? str : key;
}
function applyLang(){
    document.getElementById('mTitle').innerText=t('title'); document.getElementById('mSub').innerText=t('sub');

// ========== 音效 ==========
const Sound = { ctx:null, init(){ if(this.ctx) return; this.ctx = new (window.AudioContext||window.webkitAudioContext)(); },
    beep(f,d,tp='square',v=0.08){ if(!this.ctx) return; const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type=tp; o.frequency.value=f; g.gain.setValueAtTime(v,this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d); },
    playMove(){ this.beep(600,0.08); }, playCollect(){ this.beep(1200,0.1); setTimeout(()=>this.beep(1500,0.1),60); }, playWin(){ this.beep(523,0.12); setTimeout(()=>this.beep(659,0.12),120); setTimeout(()=>this.beep(784,0.18),240); }, playLose(){ this.beep(150,0.4,'sawtooth',0.1); },
    playStart(){ this.beep(440,0.1); setTimeout(()=>this.beep(660,0.1),100); setTimeout(()=>this.beep(880,0.12),200); }, playFirst(){ this.beep(330,0.08,'triangle'); setTimeout(()=>this.beep(440,0.08,'triangle'),80); setTimeout(()=>this.beep(550,0.08,'triangle'),160); setTimeout(()=>this.beep(660,0.12,'triangle'),240); } };

// ========== 核心数据 ==========
const CELL_EMPTY=0, CELL_BUSH=1, CELL_NEST=2, CELL_WALL=3;
const baseLevels = [
    { name:"林间空地", rows:3, cols:6, playerStart:{row:1,col:0}, nestPos:{row:1,col:5}, worms:[{row:1,col:3}],

const STORAGE_KEY = 'bird_nest_v49';
function loadRecs(){ try{ const d=localStorage.getItem(STORAGE_KEY); if(d) return JSON.parse(d); }catch(e){} return baseLevels.map(()=>null); }

function loadLevel(idx){

function getLevel(){ return levels[levelIdx]; }
function cellType(r,c){ const L=getLevel(); if(r<0||r>=L.rows||c<0||c>=L.cols) return CELL_WALL; return L.grid[r][c]; }

function calcDanger(){
    const d=[]; const L=getLevel();
    enemies.forEach((en,i)=>{
        d.push({row:en.position.row, col:en.position.col});
        if(en.isSentinel){
            const dirsH = [[-1,0],[0,1],[1,0],[0,-1]];
            const [dr,dc] = dirsH[en.viewPath[en.viewIdx]];
            for(let step=1; step<=en.viewRange; step++){
                const nr = en.position.row + dr*step, nc = en.position.col + dc*step;
                if(nr<0||nr>=L.rows||nc<0||nc>=L.cols) break;
                const ct = cellType(nr,nc);
                if(ct===CELL_WALL || ct===CELL_BUSH) break;
                d.push({row:nr, col:nc});

        } else if(en.patrolPath&&en.patrolPath.length>0){
            if(en.type==='cat'){
                const st=enemyPatrolStates[i];

                    const p=en.patrolPath;
                    let ni=st.pathIndex+st.direction;
                    if(ni>=p.length) ni=p.length-2;
                    else if(ni<0) ni=1;
                    const next = p[ni];

    d.forEach(x=>{ const k=`${x.row},${x.col}`; if(!seen.has(k)){ seen.add(k); u.push(x); } });

}

function renderGrid(){ const L=getLevel(); const pc=new Set(); enemies.forEach(e=>{ if(e.patrolPath) e.patrolPath.forEach(p=>pc.add(`${p.row},${p.col}`)); });

}

function updateUI(){ moveCountEl.textContent=moveCount; wormLeftEl.textContent=wormsRemaining.length; document.getElementById('undoBtn').disabled=moveHistory.length===0||gameOver; }
function updateButtons(){ document.getElementById('prevBtn').style.display=(!isEndless&&levelIdx>0)?'':'none'; document.getElementById('nextBtn').style.display=(!isEndless&&levelIdx<levels.length-1)?'':'none'; }

function isAdjacent(r,c){ return Math.abs(r-playerPos.row)+Math.abs(c-playerPos.col)===1; }
function onCellClick(r,c){

    if(isPlayerAt(r,c)){ selectedPlayer=!selectedPlayer; highlightCells=selectedPlayer?validMoves():[]; renderGrid(); return; }

function validMoves(){ const m=[]; [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}].forEach(d=>{ const nr=playerPos.row+d.dr,nc=playerPos.col+d.dc; if(cellType(nr,nc)!==CELL_WALL) m.push({row:nr,col:nc}); }); return m; }

function executeMove(tr,tc){

    moveHistory.push({playerPos:{...playerPos}, enemies:enemies.map(e=>({...e,position:{...e.position},patrolPath:e.patrolPath?e.patrolPath.map(p=>({...p})):null, viewIdx:e.viewIdx})), enemyPatrolStates:enemyPatrolStates.map(es=>es?{...es}:null), wormsRemaining:wormsRemaining.map(w=>({...w})), moveCount, dangerCells:dangerCells.map(d=>({...d})), isNewRecord });

        const prevBest=(loadRecs())[levelIdx]; const isNew=(prevBest===null||moveCount<prevBest); if(isNew){ const rc=loadRecs(); rc[levelIdx]=moveCount; saveRecs(rc); }

            } else {
                box.innerHTML=`<span class="msg-icon">😿</span><h2>${t('caught')}</h2><div class="btn-row"><button onclick="resetLevel()">${t('retry')}</button><button onclick="hideMessage()">${t('close')}</button></div>`;
            }
            overlay.classList.add('active');
        }
        if(!gameOver){ const rem=wormsRemaining.length; statusEl.textContent=rem>0?`🎯剩${rem}只`:'🎯回巢！'; statusEl.style.color='#2e7d32'; }
    },350);
}

function enemyTurn(){
    for(let i=0;i<enemies.length;i++) if(enemies[i].isSentinel&&!gameOver) checkSentinel(enemies[i]);
    if(gameOver) return;
    for(let i=0;i<enemies.length;i++) if(!enemies[i].isSentinel&&enemies[i].patrolPath&&!gameOver) movePatrol(i,enemies[i]);
    if(gameOver) return;
    for(let i=0;i<enemies.length;i++){ const e=enemies[i]; if(e.isSentinel){ e.viewIdx = (e.viewIdx + 1) % e.viewPath.length; } }
    for(const e of enemies) if(!gameOver&&e.position.row===playerPos.row&&e.position.col===playerPos.col){ gameOver=true; return; }
}

function checkSentinel(en){
    const dirs = [[-1,0],[0,1],[1,0],[0,-1]];
    const [dr,dc] = dirs[en.viewPath[en.viewIdx]];
    for(let step=1; step<=en.viewRange; step++){
        const nr = en.position.row + dr*step, nc = en.position.col + dc*step;
        if(nr===playerPos.row && nc===playerPos.col){
            if(cellType(playerPos.row,playerPos.col)!==CELL_BUSH){ gameOver=true; return; }
        }
        if(cellType(nr,nc)===CELL_WALL || cellType(nr,nc)===CELL_BUSH) break;

}
function movePatrol(i,en){ const s=enemyPatrolStates[i]; const p=en.patrolPath; let ni=s.pathIndex+s.direction; if(ni>=p.length){s.direction=-1;ni=p.length-2;}else if(ni<0){s.direction=1;ni=1;} s.pathIndex=ni; en.position={...p[ni]}; }

// ========== 关卡生成器 ==========
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(0,i); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function genMaze(g,w=3){ const rs=g.length,cs=g[0].length; for(let r=0;r<rs;r++){g[r][0]=w;g[r][cs-1]=w;} for(let c=0;c<cs;c++){g[0][c]=w;g[rs-1][c]=w;} function div(r1,c1,r2,c2){ if(r2-r1<2||c2-c1<2) return; const hor=Math.random()<0.5; if(hor){ const dr=rnd(r1+1,r2-1), pc=rnd(c1+1,c2-1); for(let c=c1;c<=c2;c++) if(c!==pc) g[dr][c]=w; div(r1,c1,dr-1,c2); div(dr+1,c1,r2,c2); } else { const dc=rnd(c1+1,c2-1), pr=rnd(r1+1,r2-1); for(let r=r1;r<=r2;r++) if(r!==pr) g[r][dc]=w; div(r1,c1,r2,dc-1); div(r1,dc+1,r2,c2); } } div(1,1,rs-2,cs-2); for(let i=0;i<Math.floor(rs*cs*0.05);i++){ const r=rnd(1,rs-2),c=rnd(1,cs-2); if(g[r][c]===w) g[r][c]=0; } }

function aiCanWin(level, maxAttempts = 40) {
    const { grid, playerStart, nestPos, worms, enemies: enDefs } = level;
    const rows = grid.length, cols = grid[0].length;
    const initEnemies = enDefs.map((ed) => {
        if(ed.type==='hawk'){
            return { type:'hawk', position:{...ed.position}, isSentinel:true, viewType:'rotate', viewPath:[0,1,2,3], viewIdx:0, viewRange:2 };
        } else {
            return { type:ed.type, position:{...ed.patrolPath[ed.startIndex||0]}, patrolPath:ed.patrolPath.map(p=>({...p})), isSentinel:false };
        }
    });
    const initStates = enDefs.map((ed) => ed.type==='hawk' ? null : { pathIndex:ed.startIndex||0, direction:1 });
    const allWorms = worms.map((w,i) => ({...w, idx:i}));
    const targetMask = (1<<allWorms.length)-1;
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (let att=0; att<maxAttempts; att++) {
        let pos = {...playerStart};
        let enemies = initEnemies.map(e=>({...e, position:{...e.position}, patrolPath:e.patrolPath?e.patrolPath.map(p=>({...p})):null, viewIdx:e.viewIdx}));
        let states = initStates.map(s=>s?{...s}:null);
        let collected = 0, steps = 0; const maxSteps = 500;
        while (steps < maxSteps) {
            if (pos.row===nestPos.row && pos.col===nestPos.col && collected===targetMask) return true;
            const danger = new Set();
            for (let i=0; i<enemies.length; i++) {
                const en = enemies[i];
                if (en.isSentinel) {
                    const dirsH = [[-1,0],[0,1],[1,0],[0,-1]];
                    const [dr,dc] = dirsH[en.viewPath[en.viewIdx]];
                    for(let step=1; step<=en.viewRange; step++){
                        const nr = en.position.row+dr*step, nc = en.position.col+dc*step;
                        if(nr<0||nr>=rows||nc<0||nc>=cols) break;
                        if(grid[nr][nc]===CELL_WALL || grid[nr][nc]===CELL_BUSH) break;
                        danger.add(`${nr},${nc}`);
                    }
                } else if (en.patrolPath) {
                    danger.add(`${en.position.row},${en.position.col}`);
                    if (en.type === 'cat') { const st = states[i]; if (st) { const p = en.patrolPath; let ni = st.pathIndex + st.direction; if (ni >= p.length) ni = p.length - 2; else if (ni < 0) ni = 1; if (p[ni]) danger.add(`${p[ni].row},${p[ni].col}`); } }
                }
            }
            const moves = [];
            for (const [dr,dc] of dirs) {
                const nr = pos.row+dr, nc = pos.col+dc;
                if (nr<0||nr>=rows||nc<0||nc>=cols) continue;
                if (grid[nr][nc]===CELL_WALL) continue;
                if (enemies.some(e=>e.position.row===nr&&e.position.col===nc)) continue;
                if (danger.has(`${nr},${nc}`)) continue;
                moves.push({row:nr, col:nc});
            }
            if (moves.length===0) break;
            const targets = allWorms.filter((w) => !(collected & (1<<w.idx)));
            if (targets.length===0) targets.push(nestPos);
            let bestMove = moves[0], bestDist = Infinity;
            for (const m of moves) { let minDist = Infinity; for (const t of targets) { const d = Math.abs(m.row-t.row)+Math.abs(m.col-t.col); if (d<minDist) minDist = d; } if (minDist + Math.random()*2 < bestDist) { bestDist = minDist; bestMove = m; } }
            pos = bestMove;
            const wormIdx = allWorms.findIndex((w) => !(collected & (1<<w.idx)) && w.row===pos.row && w.col===pos.col);
            if (wormIdx!==-1) collected |= (1<<allWorms[wormIdx].idx);
            const newEnemies = enemies.map(e=>({...e, position:{...e.position}, patrolPath:e.patrolPath?e.patrolPath.map(p=>({...p})):null}));
            const newStates = states.map(s=>s?{...s}:null);
            for (let i=0; i<newEnemies.length; i++) { const en = newEnemies[i]; if (!en.isSentinel && en.patrolPath && en.patrolPath.length>0) { const s = newStates[i], p = en.patrolPath; let ni = s.pathIndex + s.direction; if (ni >= p.length) { s.direction = -1; ni = p.length-2; } else if (ni < 0) { s.direction = 1; ni = 1; } if (p[ni]) { s.pathIndex = ni; en.position = {...p[ni]}; } } if (en.isSentinel) { en.viewIdx = (en.viewIdx + 1) % en.viewPath.length; } }
            if (newEnemies.some(e=>e.position.row===pos.row&&e.position.col===pos.col)) break;
            for (const en of newEnemies) { if (en.isSentinel) { const dirsH = [[-1,0],[0,1],[1,0],[0,-1]]; const [dr,dc] = dirsH[en.viewPath[en.viewIdx]]; for(let step=1; step<=en.viewRange; step++){ const nr = en.position.row+dr*step, nc = en.position.col+dc*step; if(nr===pos.row && nc===pos.col && grid[pos.row][pos.col]!==CELL_BUSH){ pos=null; break; } } } }
            if (!pos) break;
            enemies = newEnemies; states = newStates;
            steps++;
        }
    }
    return false;
}

function genLevel(rows,cols){
    for(let att=0;att<200;att++){
        let grid=Array(rows).fill().map(()=>Array(cols).fill(0)); genMaze(grid,3);
        let removeRate=0.1; if(difficulty==='easy') removeRate=0.2; else removeRate=0.1;
        const removeExtra=Math.floor(rows*cols*removeRate); for(let i=0;i<removeExtra;i++){ const r=rnd(1,rows-2),c=rnd(1,cols-2); if(grid[r][c]===3) grid[r][c]=0; }
        const pass=()=>{ const a=[]; for(let r=1;r<rows-1;r++) for(let c=1;c<cols-1;c++) if(grid[r][c]!==3) a.push({r,c}); return a; };
        const near=(p)=>{ if(grid[p.r]?.[p.c]!==3) return p; for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){ const nr=p.r+dr,nc=p.c+dc; if(nr>0&&nr<rows-1&&nc>0&&nc<cols-1&&grid[nr][nc]!==3) return{r:nr,c:nc}; } return p; };
        const st=near({r:rnd(1,rows-2),c:rnd(1,cols-2)}); const ne=near({r:rnd(1,rows-2),c:rnd(1,cols-2)});
        if(Math.abs(st.r-ne.r)+Math.abs(st.c-ne.c)<3) continue;
        let wormCount=2; if(difficulty==='easy') wormCount=rnd(1,2); else wormCount=rnd(2,3);
        const cands=pass().filter(c=>!(c.r===st.r&&c.c===st.c)&&!(c.r===ne.r&&c.c===ne.c));
        if(cands.length<wormCount+2) continue;
        const worms=shuffle(cands).slice(0,wormCount); grid[ne.r][ne.c]=2;
        let bushCount=2; if(difficulty==='easy') bushCount=rnd(2,3); else bushCount=rnd(0,2);
        const bushCands=shuffle(pass().filter(c=>!(c.r===st.r&&c.c===st.c)&&!(c.r===ne.r&&c.c===ne.c)&&!worms.some(w=>w.r===c.r&&w.c===c.c)));
        for(let i=0;i<Math.min(bushCount,bushCands.length);i++) grid[bushCands[i].r][bushCands[i].c]=1;
        let patrolCount=1,hawkCount=0; if(difficulty==='easy'){ patrolCount=1;hawkCount=0; } else{ patrolCount=rnd(1,2);hawkCount=patrolCount<2?rnd(0,1):0; }
        const enemies=[]; const free=pass().filter(c=>!(c.r===st.r&&c.c===st.c)&&!(c.r===ne.r&&c.c===ne.c)&&!worms.some(w=>w.r===c.r&&w.c===c.c)&&grid[c.r][c.c]!==1);
        const dirs = [[0,1],[1,0],[0,-1],[-1,0]]; const existingPaths = [];
        for(let i=0;i<patrolCount;i++){
            for(let tryCount=0; tryCount<10; tryCount++){
                const type=Math.random()<0.5?'cat':'snake'; const plen=rnd(5,8); let path=[]; let cur=shuffle(free)[0]; path.push({row:cur.r,col:cur.c});
                let dirIdx = rnd(0,3);
                for(let s=1;s<plen;s++){
                    const nbs=[]; for(let d=0;d<4;d++){ const [dr,dc]=dirs[d]; const nr=cur.r+dr,nc=cur.c+dc; if(nr>0&&nr<rows-1&&nc>0&&nc<cols-1&&grid[nr][nc]!==3) nbs.push({r:nr,c:nc,dir:d}); }
                    if(nbs.length===0) break;
                    if(Math.random()<0.8 && nbs.some(n=>n.dir===dirIdx)){ const next = nbs.find(n=>n.dir===dirIdx) || nbs[rnd(0,nbs.length-1)]; cur = {r:next.r,c:next.c}; dirIdx = next.dir; }
                    else { const filtered = nbs.filter(n=>n.dir!==(dirIdx+2)%4); if(filtered.length===0) break; const next = filtered[rnd(0,filtered.length-1)]; cur = {r:next.r,c:next.c}; dirIdx = next.dir; }
                    path.push({row:cur.r,col:cur.c});
                }
                if(path.length<2) continue;
                const newPathSet = new Set(path.map(p=>`${p.row},${p.col}`)); let tooClose = false;
                for(const ep of existingPaths){ for(const p of path){ if(ep.has(`${p.row},${p.col}`) || [...ep].some(epc => Math.abs(p.row-(+epc.split(',')[0]))+Math.abs(p.col-(+epc.split(',')[1])) <= 1)){ tooClose = true; break; } if(tooClose) break; } }
                if(!tooClose){ existingPaths.push(newPathSet); enemies.push({type, patrolPath:path, startIndex:0}); break; }
            }
        }
        for(let i=0;i<Math.min(hawkCount,free.length);i++){
            const pos=free[rnd(0,free.length-1)];
            enemies.push({type:'hawk', position:{row:pos.r, col:pos.c}, viewType:'rotate', viewPath:[0,1,2,3], viewRange:2});
        }
        const level={name:`随机${rows}x${cols}`,rows,cols,playerStart:{row:st.r,col:st.c},nestPos:{row:ne.r,col:ne.c},worms:worms.map(p=>({row:p.r,col:p.c})),grid,enemies};
        // 起点安全检查
        const initDanger=new Set();
        const initEnemies = enemies.map(e => { if(e.type==='hawk') return { ...e, position:{...e.position}, viewIdx: 0 }; else return { type:e.type, position:e.patrolPath[0], patrolPath:e.patrolPath, isSentinel:false }; });
        for(let i=0;i<initEnemies.length;i++){
            const en=initEnemies[i];
            if(en.isSentinel){
                const dirsH = [[-1,0],[0,1],[1,0],[0,-1]]; const [dr,dc] = dirsH[en.viewPath[0]];
                for(let step=1; step<=en.viewRange; step++){
                    const nr = en.position.row+dr*step, nc = en.position.col+dc*step;
                    if(nr<0||nr>=rows||nc<0||nc>=cols) break;
                    if(grid[nr][nc]===CELL_BUSH || grid[nr][nc]===CELL_WALL) break;
                    initDanger.add(`${nr},${nc}`);
                }
            } else if(en.patrolPath){ initDanger.add(`${en.position.row},${en.position.col}`); if(en.type==='cat'){ const p=en.patrolPath; let ni=1; if(p[ni]) initDanger.add(`${p[ni].row},${p[ni].c}`); } }
        }
        let safe=true;
        for(const[dr,dc] of[[-1,0],[1,0],[0,-1],[0,1]]){ const nr=st.r+dr,nc=st.c+dc; if(nr<0||nr>=rows||nc<0||nc>=cols) continue; if(grid[nr][nc]===CELL_WALL) continue; if(initDanger.has(`${nr},${nc}`)||initDanger.has(`${st.r},${st.c}`)){ safe=false; break; } }
        if(!safe) continue;
        if(aiCanWin(level, 40)) return level;
    }
    return null;
}

// 全局函数
window.showDifficulty = function(){ box.innerHTML = `<h2>${t('difficulty')}</h2><div class="btn-row"><button class="btn" onclick="setDiff('easy')">${t('easy')}</button><button class="btn" onclick="setDiff('normal')" style="border-color:#ff8f00;">${t('normal')}</button></div><button onclick="hideMessage()">${t('cancel')}</button>`; overlay.classList.add('active'); };
window.setDiff = function(d){ difficulty=d; hideMessage(); startEndless(); };
window.startNormalGame = function(){ levels=[...baseLevels]; levelIdx=0; isEndless=false; menuDiv.style.display='none'; gameDiv.style.display='flex'; gameStarted=true; Sound.init(); loadLevel(0); };
function startEndless(){ isEndless=true; endlessScore=0; endlessWave=1; let rl = null; for(let attempt=0; attempt<10; attempt++){ rl = genLevel(rnd(5,9), rnd(5,9)); if(rl) break; } if(!rl){ alert('生成失败，请重试'); return; } levels=[rl]; levelIdx=0; menuDiv.style.display='none'; gameDiv.style.display='flex'; gameStarted=true; Sound.init(); loadLevel(0); }
window.startEndless = startEndless;
window.backToMenu = function(){ if(gameStarted && !gameOver && !gameWon && moveHistory.length>0) if(!confirm(t('confirmBack'))) return; gameStarted=gameOver=gameWon=false; isEndless=false; endlessScore=0; endlessWave=1; levels=[...baseLevels]; gameDiv.style.display='none'; menuDiv.style.display='block'; };
window.showHelp = function(){ box.innerHTML=`<span class="msg-icon">🐦</span><h2>${t('title')}</h2><p>收集所有蠕虫，返回鸟巢！</p><div style="text-align:left;font-size:0.74rem;line-height:1.6;"><div>🎯 目标：收集所有🪱蠕虫，回到🪹鸟巢</div><div>👆 操作：点相邻格移动，或点小鸟看范围</div><div>🟠 橙色格：巡逻路线  🔴 红色格：危险（踏入即死）</div><div>🧱 围墙   🌿 灌木：躲避🦅鹰视线</div><div>🦅 旋转鹰：视野每回合转动</div></div><div class="btn-row"><button onclick="hideMessage()">关闭</button></div>`; overlay.classList.add('active'); };
window.showRecordsPanel = function(){ const rc=loadRecs(); let rows=''; for(let i=0;i<5;i++){ const b=rc[i]||null; rows+=`<tr><td>${i+1}</td><td>${baseLevels[i].name}</td><td>${b!==null?b+'步':'--'}</td></tr>`; } box.innerHTML=`<span class="msg-icon">📊</span><h2>最佳记录</h2><table class="records-table"><tr><th>#</th><th>关卡</th><th>最少步数</th></tr>${rows}</table><p>记录保存在本地</p><div class="btn-row"><button onclick="hideMessage()">关闭</button><button onclick="clearRecords()">🗑清除</button></div>`; overlay.classList.add('active'); };
window.clearRecords = function(){ if(confirm('确定清除所有记录吗？')){ saveRecs(baseLevels.map(()=>null)); updBestBadge(); hideMessage(); } };
window.hideMessage = hideMessage;
window.takeScreenshot = function(){
    try{ const level=getLevel(); const rows=level.rows,cols=level.cols; const cellSize=60; const canvas=document.createElement('canvas'); canvas.width=cols*cellSize; canvas.height=rows*cellSize; const ctx=canvas.getContext('2d');
        for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){ const x=c*cellSize,y=r*cellSize; const ct=cellType(r,c); if(ct===CELL_WALL) ctx.fillStyle='#5d4037'; else if(ct===CELL_BUSH) ctx.fillStyle='#2e7d32'; else if(ct===CELL_NEST||isNestAt(r,c)) ctx.fillStyle='#ffe082'; else if((r+c)%2===0) ctx.fillStyle='#b9dbbc'; else ctx.fillStyle='#c8e6c9'; ctx.fillRect(x,y,cellSize,cellSize); const eh=enemyAt(r,c); if(eh){ ctx.font=`${cellSize*0.7}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(eh.type==='cat'?'🐱':eh.type==='hawk'?'🦅':'🐍',x+cellSize/2,y+cellSize/2); } if(isWormAt(r,c)){ ctx.font=`${cellSize*0.7}px Arial`; ctx.fillText('🪱',x+cellSize/2,y+cellSize/2); } if(isPlayerAt(r,c)&&!gameWon){ ctx.font=`${cellSize*0.8}px Arial`; ctx.fillText('🐦',x+cellSize/2,y+cellSize/2); } }
        canvas.toBlob(blob=>{ const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`bird-nest-${Date.now()}.png`; a.click(); URL.revokeObjectURL(url); });
    }catch(e){ alert('截图失败'); }
};

window.resetLevel = ()=>{ hideMessage(); loadLevel(levelIdx); };
window.nextLevel = ()=>{ if(!isEndless&&levelIdx<levels.length-1){ hideMessage(); loadLevel(levelIdx+1); } };
window.prevLevel = ()=>{ if(!isEndless&&levelIdx>0){ hideMessage(); loadLevel(levelIdx-1); } };
window.undoMove = undoMove;
window.exitEndless = exitEndless;

gridEl.addEventListener('touchstart',e=>{ if(e.touches.length===1){ window._tx=e.touches[0].clientX; window._ty=e.touches[0].clientY; } },{passive:true});
gridEl.addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});
gridEl.addEventListener('touchend',e=>{ if(!gameStarted||gameOver||gameWon) return; const dx=(e.changedTouches[0]?.clientX||window._tx)-window._tx, dy=(e.changedTouches[0]?.clientY||window._ty)-window._ty; if(Math.abs(dx)<30&&Math.abs(dy)<30) return; let dr=0,dc=0; if(Math.abs(dx)>Math.abs(dy)) dc=dx>0?1:-1; else dr=dy>0?1:-1; const nr=playerPos.row+dr, nc=playerPos.col+dc; if(cellType(nr,nc)!==CELL_WALL){ e.preventDefault(); executeMove(nr,nc); } });
document.addEventListener('keydown',e=>{ if(!gameStarted||gameOver||gameWon||overlay.classList.contains('active')) return; let dr=0,dc=0; if(e.key==='ArrowUp'||e.key==='w') dr=-1; else if(e.key==='ArrowDown'||e.key==='s') dr=1; else if(e.key==='ArrowLeft'||e.key==='a') dc=-1; else if(e.key==='ArrowRight'||e.key==='d') dc=1; else if(e.key==='r'||e.key==='R'){ resetLevel(); return; } else if((e.key==='z'||e.key==='Z')&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); undoMove(); return; } else return; e.preventDefault(); const nr=playerPos.row+dr, nc=playerPos.col+dc; if(cellType(nr,nc)!==CELL_WALL) executeMove(nr,nc); });

menuDiv.style.display='block'; gameDiv.style.display='none'; applyLang();
</script>
